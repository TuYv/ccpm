<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A84FF"/>
      <stop offset="100%" stop-color="#0050CC"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="8" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- macOS-style rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bgGrad)"/>

  <!-- Stacked preset cards (layered rectangles, increasing widths) -->
  <g filter="url(#softShadow)">
    <!-- Bottom card -->
    <rect x="232" y="612" width="560" height="120" rx="32" ry="32" fill="#FFFFFF" fill-opacity="0.45"/>
    <!-- Middle card -->
    <rect x="200" y="450" width="624" height="120" rx="32" ry="32" fill="#FFFFFF" fill-opacity="0.7"/>
    <!-- Top card (most prominent, shows "lines" hint of CLAUDE.md content) -->
    <rect x="168" y="288" width="688" height="120" rx="32" ry="32" fill="#FFFFFF"/>
    <rect x="208" y="318" width="380" height="14" rx="7" fill="#0A84FF" fill-opacity="0.8"/>
    <rect x="208" y="350" width="280" height="14" rx="7" fill="#0A84FF" fill-opacity="0.45"/>
    <rect x="208" y="382" width="200" height="14" rx="7" fill="#0A84FF" fill-opacity="0.3"/>
  </g>

  <!-- Claude-style sparkle in upper-right corner -->
  <g transform="translate(800, 200)">
    <path d="M 0 -90 L 16 -16 L 90 0 L 16 16 L 0 90 L -16 16 L -90 0 L -16 -16 Z"
          fill="#FFFFFF" opacity="0.95"/>
    <circle cx="0" cy="0" r="14" fill="#0A84FF"/>
  </g>
</svg>
