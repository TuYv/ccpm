name: scanner

on:
  schedule:
    - cron: "17 * * * *"   # hourly at :17 (off the :00 spike)
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: preset-registry/scripts/scanner/pnpm-lock.yaml

      - name: Install scanner deps
        working-directory: preset-registry/scripts/scanner
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Run scanner
        working-directory: preset-registry/scripts/scanner
        env:
          # Use a fine-grained PAT (public-repo read) instead of the default
          # GITHUB_TOKEN: installation tokens get aggressively throttled on
          # /search/code (secondary rate limits). Falls back to GITHUB_TOKEN
          # if SCANNER_PAT isn't set.
          GITHUB_TOKEN: ${{ secrets.SCANNER_PAT || secrets.GITHUB_TOKEN }}
          REGISTRY_DIR: ${{ github.workspace }}/preset-registry
          # Chinese summary generation. Set ANTHROPIC_API_KEY in repo secrets to enable;
          # if absent, the translation step is a no-op. Override the model / readme
          # truncation / concurrency here without touching code.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL }}
          TRANSLATION_MODEL: ${{ vars.TRANSLATION_MODEL || 'claude-haiku-4-5' }}
          TRANSLATION_README_CHARS: ${{ vars.TRANSLATION_README_CHARS || '2000' }}
          TRANSLATION_CONCURRENCY: ${{ vars.TRANSLATION_CONCURRENCY || '3' }}
        run: pnpm run scan

      - name: Commit changes
        run: |
          git config user.name "ccpm-scanner-bot"
          git config user.email "scanner@ccpm.local"
          git add preset-registry/index.json \
                  preset-registry/translations.json \
                  preset-registry/presets/ \
                  preset-registry/skills/ \
                  preset-registry/mcps/ \
                  preset-registry/bundles/
          if ! git diff --cached --quiet; then
            git commit -m "chore(registry): auto-discover update $(date -u +%FT%TZ)"
            git push
          else
            echo "No changes"
          fi
